<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --accent: #888;
      --muted: #aaa;
      --card-bg: #f2f2f2;
      --border: rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 80px 60px 60px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1rem;
      animation: fadeDown 0.9s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 7vw, 6rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    .name span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    main {
      position: relative;
      z-index: 1;
      padding: 60px 60px 80px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      background: var(--card-bg);
      cursor: pointer;
      animation: fadeUp 0.7s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s ease;
      filter: saturate(0.85) brightness(0.92);
    }

    /* Placeholder gradient when no real image */
    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 4/5;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .card:hover .card-img,
    .card:hover .card-img-placeholder {
      transform: scale(1.04);
      filter: saturate(1) brightness(1);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px 20px;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: #fff;
      transform: translateY(8px);
      transition: transform 0.35s ease;
    }

    .card-sub {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
      transform: translateY(8px);
      transition: transform 0.4s ease 0.05s;
    }

    .card:hover .card-title,
    .card:hover .card-sub {
      transform: translateY(0);
    }

    /* Gradient placeholders */
    .g1 { background: linear-gradient(135deg, #e8ddd0 0%, #d4c4b0 50%, #c8b89a 100%); }
    .g2 { background: linear-gradient(135deg, #cdd8e8 0%, #b8ccd8 50%, #a0b8cc 100%); }
    .g3 { background: linear-gradient(135deg, #cde8d0 0%, #b8d8bc 50%, #a0c8a4 100%); }
    .g4 { background: linear-gradient(135deg, #e0cde8 0%, #d0b8d8 50%, #c0a0c8 100%); }
    .g5 { background: linear-gradient(135deg, #e8e0cd 0%, #d8d0b0 50%, #c8c09a 100%); }
    .g6 { background: linear-gradient(135deg, #cde0e8 0%, #b0ccd8 50%, #9abcc8 100%); }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 30px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    footer a {
      color: var(--text);
      text-decoration: none;
      transition: opacity 0.2s;
    }
    footer a:hover { opacity: 0.5; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      header {
        padding: 48px 24px 40px;
      }
      main { padding: 40px 24px 60px; }
      footer { padding: 24px; flex-direction: column; gap: 10px; text-align: center; }

      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card-img,
      .card-img-placeholder {
        aspect-ratio: 3/4;
      }

      .card-overlay { opacity: 1; }
      .card-title, .card-sub { transform: translateY(0); }
    }
  </style>
</head>
<body>

  <main>

  <footer>
    <span>© 2026 Shirin Choi</span>
